<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>TakeOff Visual Editor</title>

  <link rel="stylesheet" href="https://unpkg.com/grapesjs/dist/css/grapes.min.css">
  <script src="https://unpkg.com/grapesjs"></script>
  <script src="/editor/blocks/generated-blocks.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
    }

    #gjs {
      height: 100vh;
    }
  </style>
</head>

<body>
  <div id="gjs"></div>

  <script>
    const editor = grapesjs.init({
      container: "#gjs",
      height: "100vh",
      fromElement: false,
      storageManager: false,

      components: `
        <main style="min-height:100vh;padding:80px;text-align:center;font-family:Arial;">
          <h1>TakeOff Builder</h1>
          <p>Trascina le sezioni da sinistra.</p>
        </main>
      `,

      canvas: {
        styles: window.takeoffCanvasStyles || []
      },

      blockManager: {
        appendTo: false
      }
    });

    if (window.registerTakeoffBlocks) {
      window.registerTakeoffBlocks(editor);
    }

    editor.Panels.addButton("options", {
      id: "export-html",
      label: "Export HTML",
      command(editor) {
        const styles = (window.takeoffCanvasStyles || [])
          .map(s => `<link rel="stylesheet" href="${s}">`)
          .join("\n");

        const full = `
<!doctype html>
<html>
<head>
<meta charset="utf-8">
${styles}
<style>${editor.getCss()}</style>
</head>
<body>
${editor.getHtml()}
</body>
</html>`;

        const blob = new Blob([full], { type: "text/html" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "index-export.html";
        a.click();
      }
    });
  </script>
</body>
</html>
