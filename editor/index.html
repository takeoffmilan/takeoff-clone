<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>TakeOff Builder</title>

<link rel="stylesheet"
href="https://unpkg.com/grapesjs/dist/css/grapes.min.css">

<script src="https://unpkg.com/grapesjs"></script>

<style>
html,body{
height:100%;
margin:0;
}

#gjs{
height:100vh;
}

.panel__top{
padding:0;
width:100%;
display:flex;
}

.panel__basic-actions{
position:initial;
}
</style>
</head>

<body>

<div id="gjs">
<section style="padding:100px;text-align:center">
<h1>TakeOff</h1>
<p>Clicca e modifica testo, immagini, colori.</p>
<a href="#" style="padding:15px 30px;background:#000;color:#fff;text-decoration:none;border-radius:40px;">
Contact Us
</a>
</section>
</div>

<script>
const editor = grapesjs.init({
container:'#gjs',
height:'100vh',

storageManager:false,

panels:{
defaults:[
{
id:'panel-top',
el:'.panel__top'
},
{
id:'basic-actions',
el:'.panel__basic-actions',
buttons:[
{
id:'visibility',
active:true,
className:'fa fa-eye',
command:'sw-visibility'
},
{
id:'export',
label:'Export',
command:'export-template'
}
]
}
]
},

blockManager:{
appendTo:'body'
}
});


editor.BlockManager.add('text',{
label:'Text',
content:'<div style="padding:30px;">Nuovo testo</div>'
});

editor.BlockManager.add('image',{
label:'Image',
content:'<img src="https://via.placeholder.com/800x400">'
});

editor.BlockManager.add('button',{
label:'Button',
content:'<a href="#" style="padding:14px 30px;background:#000;color:#fff;border-radius:40px;">Button</a>'
});

editor.BlockManager.add('section',{
label:'Section',
content:'<section style="padding:80px"><h2>Nuova sezione</h2></section>'
});
</script>

</body>
</html>
